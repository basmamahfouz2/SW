name: Python CI

on:
  push:
    paths:
      - 'SS.py'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'SS.py'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10, 3.11]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint `SS.py`
        run: flake8 SS.py

      - name: Syntax check
        run: python -m py_compile SS.py

      - name: Smoke run
        run: |
          echo "hello world" > sample.txt
          python SS.py sample.txt
